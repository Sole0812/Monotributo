<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Informes Monotributo · María Soledad Montoya</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;color:#222;background:#f5f5f3;min-height:100vh}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:#e8e8e4;border-right:1px solid #d0d0cc;padding:1.25rem;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.sidebar-logo{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-bottom:10px;border-bottom:1px solid #d0d0cc}
.sidebar-logo strong{display:block;font-size:13px;color:#444;text-transform:none;letter-spacing:0;margin-bottom:2px}
.sidebar h3{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.client-item{padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13px;color:#555;border:1px solid transparent;display:flex;justify-content:space-between;align-items:center}
.client-item:hover{background:#fff;border-color:#ddd}
.client-item.active{background:#fff;border-color:#c0c0b8;color:#222;font-weight:500}
.client-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.del-btn{font-size:11px;color:#bbb;padding:0 4px;cursor:pointer}
.del-btn:hover{color:#e05050}
.btn-new{width:100%;border:1px dashed #bbb;background:transparent;border-radius:8px;padding:9px;font-size:13px;cursor:pointer;color:#888;margin-top:6px}
.btn-new:hover{background:#fff}
.main{padding:2rem;overflow-y:auto;background:#fafaf8}
.page-title{font-size:20px;font-weight:600;color:#333;margin-bottom:1.5rem}
.tabs{display:flex;gap:2px;margin-bottom:1.5rem;border-bottom:1px solid #e0e0da;flex-wrap:wrap}
.tab{font-size:13px;padding:7px 14px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:#444}
.tab.active{color:#333;font-weight:500;border-bottom-color:#58677e}
.tab-content{display:none}.tab-content.active{display:block}
label{display:block;font-size:12px;color:#777;margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;font-size:13px;border:1px solid #ddd;border-radius:6px;padding:7px 10px;background:#fff;color:#222;outline:none}
input:focus,select:focus,textarea:focus{border-color:#58677e}
textarea{resize:vertical;min-height:52px}
.row{display:grid;gap:12px;margin-bottom:14px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}
.card{background:#fff;border:1px solid #e8e8e2;border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-title{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.85rem}
.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:7px 10px;border-radius:7px;background:#f8f8f6}
.toggle-row label{margin:0;font-size:13px;color:#444;cursor:pointer;font-weight:400}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#58677e}
.rubro-row{display:grid;grid-template-columns:1fr 150px auto;gap:8px;margin-bottom:10px;align-items:end}
.btn-add{font-size:12px;border:1px dashed #ccc;background:transparent;border-radius:7px;padding:6px 14px;cursor:pointer;color:#888}
.btn-add:hover{background:#f5f5f3}
.btn-remove{background:transparent;border:none;color:#ccc;cursor:pointer;padding:6px 8px;font-size:16px;border-radius:6px}
.btn-remove:hover{color:#e05050;background:#fff0f0}
.month-table{width:100%;border-collapse:collapse}
.month-table th{font-size:11px;color:#aaa;font-weight:600;padding:6px 8px;text-align:right;border-bottom:1px solid #eee;background:#fafaf8}
.month-table th:first-child{text-align:left}
.month-table td{padding:4px 5px;border-bottom:1px solid #f0f0ec}
.month-table td input{font-size:13px;text-align:right;border:1px solid #e0e0e0;background:#fff;padding:5px 8px;border-radius:6px;width:100%;color:#333}
.month-table td input:focus{border-color:#58677e;outline:none;background:#fff}
.month-table td:first-child{font-size:12px;color:#aaa;padding-left:4px;width:42px;font-weight:500}
.month-table tr:hover td{background:#fafaf8}
.month-table tr.total-row td{font-size:12px;font-weight:600;background:#f0f0ec;padding:6px 5px;color:#444}
.total-row td:first-child{padding-left:8px}
.col-fact{background:#f0f5ff}
.col-oblig{background:#fff5f5}
.btn-pdf{background:#58677e;color:#fff;border:none;border-radius:9px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:.75rem}
.btn-pdf:hover{background:#46556a}
.empty-state{text-align:center;padding:5rem 2rem;color:#bbb}
.empty-state p{font-size:15px;margin-bottom:1.25rem;color:#aaa}
.preview-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0ec;font-size:13px}
.preview-label{color:#999}
.preview-val{color:#333;font-weight:500}
.section-sep{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin:14px 0 8px;padding-top:10px;border-top:1px solid #eee}
.opt-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;background:#eef2f7;color:#58677e;margin-left:6px;font-weight:600}
.alert-info{background:#eef2f7;border:1px solid #c8d4e3;border-radius:8px;padding:10px 14px;font-size:13px;color:#58677e;margin-bottom:1rem}
.resumen-table{width:100%;border-collapse:collapse;margin-bottom:1rem}
.resumen-table td{padding:9px 12px;border-bottom:1px solid #f0f0ec;font-size:13px}
.resumen-table td:last-child{text-align:right;font-weight:500;color:#333}
.resumen-table td:first-child{color:#777}
.resumen-table tr.total-gastos td{background:#fff3f0;font-weight:600;color:#c0392b;font-size:14px}
.resumen-table tr.ganancia td{background:#f0faf4;font-weight:700;color:#27ae60;font-size:15px}
.resumen-table tr.porcentaje td{background:#f8f8f6;color:#666;font-size:12px}
.resumen-table tr.fact-total td{background:#f0f4ff;font-weight:600;color:#1a4ea8}
.recat-box{background:#e8f0fb;border:1px solid #c0d0e8;border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.recat-title{font-size:12px;font-weight:600;color:#3a5a8a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
.recat-number{font-size:30px;font-weight:700;color:#1a3a6a;margin-bottom:.5rem}
.cat-table{width:100%;border-collapse:collapse}
.cat-table th{font-size:11px;color:#aaa;font-weight:600;padding:6px 10px;text-align:left;border-bottom:1px solid #eee;background:#fafaf8}
.cat-table td{padding:7px 10px;border-bottom:1px solid #f0f0ec;font-size:12px}
.cat-table tr.actual td{background:#deeeff;font-weight:700;color:#1a5c9e}
.cat-table tr.siguiente td{background:#fff8e0;font-weight:600;color:#8a6200}
.cat-table tr.excedido td{background:#fff0f0;color:#c0392b}
.badge-ok{display:inline-block;background:#e8f8ed;color:#27ae60;font-size:12px;padding:4px 12px;border-radius:10px;font-weight:600}
.badge-warn{display:inline-block;background:#fff8e0;color:#e67e22;font-size:12px;padding:4px 12px;border-radius:10px;font-weight:600}
.badge-danger{display:inline-block;background:#fff0f0;color:#c0392b;font-size:12px;padding:4px 12px;border-radius:10px;font-weight:600}
.pct-bar-wrap{background:#eee;border-radius:10px;height:10px;margin-top:8px;overflow:hidden}
.pct-bar{height:10px;border-radius:10px}
.col-header-fact{font-size:10px;color:#446;background:#eef2ff;padding:4px 8px;border-radius:4px;display:inline-block;margin-bottom:4px}
.col-header-oblig{font-size:10px;color:#844;background:#fff0f0;padding:4px 8px;border-radius:4px;display:inline-block;margin-bottom:4px}

/* Quitar flechas de inputs numéricos */
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
/* Settings panel */
.settings-btn{position:fixed;bottom:1.5rem;left:1rem;background:#58677e;color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.settings-btn:hover{background:#46556a}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:2rem;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;color:#333;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid #eee}
.modal-footer{display:flex;gap:10px;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #eee}
.btn-save{background:#58677e;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;flex:1}
.btn-save:hover{background:#46556a}
.btn-cancel{background:transparent;border:1px solid #ddd;border-radius:8px;padding:9px 20px;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <strong>María Soledad Montoya</strong>
      Gestión del Cambio · Informes Monotributo
    </div>
    <h3>Clientes</h3>
    <div id="client-list"></div>
    <button class="btn-new" onclick="newClient()">+ Nuevo cliente</button>
  </div>
  <div class="main" id="main-area">
    <div class="empty-state">
      <p>Seleccioná un cliente o creá uno nuevo para comenzar.</p>
      <button class="btn-new" style="width:auto;padding:10px 22px;border-radius:8px" onclick="newClient()">+ Nuevo cliente</button>
    </div>
  </div>
</div>

<script>
const MESES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const MESES_FULL=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const CATEGORIAS_2026=[
  {cat:'A',limite:10277988.13},{cat:'B',limite:15058447.71},{cat:'C',limite:21113696.52},
  {cat:'D',limite:26212853.42},{cat:'E',limite:30833964.37},{cat:'F',limite:38642048.36},
  {cat:'G',limite:46211109.37},{cat:'H',limite:70113407.33},{cat:'I',limite:78479211.62},
  {cat:'J',limite:89872640.30},{cat:'K',limite:108357084.05}
];

var appData={clients:[]};
var currentId=null;

function saveData(){try{localStorage.setItem('mono_clients_v3',JSON.stringify(appData.clients));}catch(e){}}
function loadData(){try{var s=localStorage.getItem('mono_clients_v3');if(s)appData.clients=JSON.parse(s);}catch(e){appData.clients=[];}}
function getClient(){for(var i=0;i<appData.clients.length;i++){if(appData.clients[i].id===currentId)return appData.clients[i];}return null;}

function makeClient(){
  return {
    id:'c'+Date.now(),nombre:'',cuit:'',domicilio:'',categoria:'E',
    rubros:[{nombre:'Facturación principal',tipo:'servicios'}],
    meses:[],vencFecha:'',vencImporte:'',
    arcaDeuda:false,arcaDeudor:'',arcaMensual:'',arcaNota:'',
    atpAldia:true,atpDeuda:'',
    tieneTasasNac:false,tieneTasaMunicipal:false,municipio:'',
    tieneMipyme:false,mipymeVence:'',mipymeCat:'Micro',
    tieneFactRec:false,tienePctCompras:false,pctCompras:30,
    tieneAlquiler:false,alquiler:'',
    tieneLuz:false,luz:'',
    tieneInternet:false,internet:'',
    tieneRentas:false,rentas:'',labelRentas:'Rentas / DGR',
    tieneOtrosGastos:false,otrosGastos:'',labelOtros:'Otros gastos',
    recatFecha:'julio',semAnterior:'',
    anio:String(new Date().getFullYear()),
    mesInforme:String(new Date().getMonth())
  };
}

function newClient(){
  var c=makeClient();
  for(var i=0;i<12;i++)c.meses.push({});
  appData.clients.push(c);saveData();
  currentId=c.id;renderSidebar();renderMain();
}

function selectClient(id){currentId=id;renderSidebar();renderMain();}

function deleteClient(id,e){
  e.stopPropagation();
  if(!confirm('¿Eliminar este cliente?'))return;
  appData.clients=appData.clients.filter(function(c){return c.id!==id;});
  if(currentId===id)currentId=null;
  saveData();renderSidebar();
  if(!currentId)document.getElementById('main-area').innerHTML='<div class="empty-state"><p>Seleccioná un cliente o creá uno nuevo.</p><button class="btn-new" style="width:auto;padding:10px 22px;border-radius:8px" onclick="newClient()">+ Nuevo cliente</button></div>';
  else renderMain();
}

function renderSidebar(){
  var el=document.getElementById('client-list'),html='';
  for(var i=0;i<appData.clients.length;i++){
    var c=appData.clients[i],a=c.id===currentId?' active':'';
    html+='<div class="client-item'+a+'" onclick="selectClient(\''+c.id+'\')">';
    html+='<span class="client-name">'+(c.nombre||'Sin nombre')+'</span>';
    html+='<span class="del-btn" onclick="deleteClient(\''+c.id+'\',event)">✕</span></div>';
  }
  el.innerHTML=html;
}

function up(f,v){var c=getClient();if(!c)return;c[f]=v;saveData();if(f==='nombre')renderSidebar();}
function upM(mi,k,v){var c=getClient();if(!c)return;if(!c.meses[mi])c.meses[mi]={};c.meses[mi][k]=v;saveData();calcTotales();}
function getV(c,m,k){return parseFloat((c.meses[m]&&c.meses[m][k])?c.meses[m][k]:0)||0;}

function getTotalFact(c){
  var t=0;
  for(var m=0;m<12;m++)for(var r=0;r<c.rubros.length;r++)t+=getV(c,m,'r'+r);
  return t;
}

function calcTotales(){
  var c=getClient();if(!c)return;
  var nR=c.rubros.length,tots=[],grand=0;
  for(var i=0;i<nR;i++)tots.push(0);
  for(var m=0;m<12;m++){
    var rowT=0;
    for(var r=0;r<nR;r++){var v=getV(c,m,'r'+r);tots[r]+=v;rowT+=v;}
    var rt=document.getElementById('rowt-'+m);if(rt)rt.textContent=rowT>0?'$'+rowT.toLocaleString('es-AR',{maximumFractionDigits:0}):'';
    grand+=rowT;
  }
  for(var r=0;r<nR;r++){var el=document.getElementById('colt-'+r);if(el)el.textContent=tots[r]>0?'$'+tots[r].toLocaleString('es-AR',{maximumFractionDigits:0}):'';}
  var gt=document.getElementById('grand-total');if(gt)gt.textContent=grand>0?'$'+grand.toLocaleString('es-AR',{maximumFractionDigits:0}):'';
  var gr=document.getElementById('gastos-live');if(gr)renderGastosLive(c,grand);
}

function getGastosCompletos(c){
  var totalFact=getTotalFact(c);
  var gastos=[];
  if(c.tieneFactRec){var fr=0;for(var m=0;m<12;m++)fr+=getV(c,m,'fr');if(fr>0)gastos.push({label:'Facturas recibidas',val:fr});}
  if(c.tienePctCompras){var pct=parseFloat(c.pctCompras||0)/100;gastos.push({label:'Compras estimadas ('+c.pctCompras+'%)',val:totalFact*pct});}
  var atpT=0;for(var m=0;m<12;m++)atpT+=getV(c,m,'atp');if(atpT>0)gastos.push({label:'ATP',val:atpT});
  var monoT=0;for(var m=0;m<12;m++)monoT+=getV(c,m,'mono');if(monoT>0)gastos.push({label:'Monotributo',val:monoT});
  if(c.tieneTasasNac){
    var tusT=0,cntT=0;for(var m=0;m<12;m++){tusT+=getV(c,m,'tus');cntT+=getV(c,m,'cnt');}
    if(tusT>0)gastos.push({label:'Tasa Universal de Servicio',val:tusT});
    if(cntT>0)gastos.push({label:'Tasa CNT',val:cntT});
  }
  if(c.tieneTasaMunicipal){var munT=0;for(var m=0;m<12;m++)munT+=getV(c,m,'mun');if(munT>0)gastos.push({label:'Tasa Municipal',val:munT});}
  if(c.tieneAlquiler&&c.alquiler)gastos.push({label:'Alquiler',val:parseFloat(c.alquiler)*12});
  if(c.tieneLuz&&c.luz)gastos.push({label:'Luz',val:parseFloat(c.luz)*12});
  if(c.tieneInternet&&c.internet)gastos.push({label:'Internet / Celular',val:parseFloat(c.internet)*12});
  if(c.tieneRentas&&c.rentas)gastos.push({label:c.labelRentas||'Rentas / DGR',val:parseFloat(c.rentas)});
  if(c.tieneOtrosGastos&&c.otrosGastos)gastos.push({label:c.labelOtros||'Otros gastos',val:parseFloat(c.otrosGastos)});
  return gastos;
}

function addRubro(){var c=getClient();if(!c||c.rubros.length>=5)return;c.rubros.push({nombre:'',tipo:'servicios'});saveData();renderMain();}
function removeRubro(i){
  var c=getClient();if(!c||c.rubros.length<=1)return;
  c.rubros.splice(i,1);saveData();renderMain();
}
function upRubro(i,f,v){var c=getClient();if(!c)return;c.rubros[i][f]=v;saveData();if(f==='nombre'){var th=document.getElementById('rth-'+i);if(th)th.textContent=v||('Rubro '+(i+1));}}

function renderMain(){
  var c=getClient();
  if(!c){document.getElementById('main-area').innerHTML='<div class="empty-state"><p>Seleccioná un cliente.</p></div>';return;}

  var mesOpts='';for(var i=0;i<MESES_FULL.length;i++)mesOpts+='<option value="'+i+'"'+(String(c.mesInforme)==String(i)?' selected':'')+'>'+MESES_FULL[i]+'</option>';
  var catOpts='';var cats=['A','B','C','D','E','F','G','H','I','J','K'];for(var i=0;i<cats.length;i++)catOpts+='<option'+(c.categoria===cats[i]?' selected':'')+'>'+cats[i]+'</option>';

  var rubrosHtml='';
  for(var i=0;i<c.rubros.length;i++){
    var r=c.rubros[i];
    rubrosHtml+='<div class="rubro-row"><div><label>Rubro '+(i+1)+'</label><input type="text" value="'+(r.nombre||'')+'" placeholder="Ej: Facturación cabañas" oninput="upRubro('+i+',\'nombre\',this.value)"></div>';
    rubrosHtml+='<div><label>Tipo</label><select onchange="upRubro('+i+',\'tipo\',this.value)"><option value="servicios"'+(r.tipo==='servicios'?' selected':'')+'>Servicios</option><option value="productos"'+(r.tipo==='productos'?' selected':'')+'>Productos</option></select></div>';
    rubrosHtml+=c.rubros.length>1?'<button class="btn-remove" onclick="removeRubro('+i+')">×</button>':'<div></div>';
    rubrosHtml+='</div>';
  }

  // Tabla facturación - columnas de rubros + opcionales
  var thRubros='';for(var i=0;i<c.rubros.length;i++)thRubros+='<th id="rth-'+i+'" style="color:#224;background:#f0f4ff">'+(c.rubros[i].nombre||'Rubro '+(i+1))+'</th>';
  var totRubros='';for(var i=0;i<c.rubros.length;i++)totRubros+='<td id="colt-'+i+'" style="text-align:right;color:#446;font-weight:600"></td>';
  var thFR=c.tieneFactRec?'<th style="color:#224;background:#f0f4ff">Fact. Recibidas</th>':'';
  var thATP='<th style="color:#844;background:#fff0f0">ATP ($)</th>';
  var thMono='<th style="color:#844;background:#fff0f0">Monotributo ($)</th>';
  var thTUS=c.tieneTasasNac?'<th style="color:#844;background:#fff0f0">TUSV ($)</th>':'';
  var thCNT=c.tieneTasasNac?'<th style="color:#844;background:#fff0f0">CNT ($)</th>':'';
  var thMun=c.tieneTasaMunicipal?'<th style="color:#844;background:#fff0f0">T.Municipal ($)</th>':'';

  var filas='';
  for(var m=0;m<12;m++){
    filas+='<tr><td>'+MESES[m]+'</td>';
    for(var r=0;r<c.rubros.length;r++){
      var v=getV(c,m,'r'+r)||'';if(v===0)v='';
      filas+='<td style="background:#f8faff"><input type="number" value="'+v+'" placeholder="0" oninput="upM('+m+',\'r'+r+'\',this.value)"></td>';
    }
    if(c.tieneFactRec){var fr=getV(c,m,'fr')||'';if(fr===0)fr='';filas+='<td style="background:#f8faff"><input type="number" value="'+fr+'" placeholder="0" oninput="upM('+m+',\'fr\',this.value)"></td>';}
    var atp=getV(c,m,'atp')||'';if(atp===0)atp='';
    filas+='<td style="background:#fff8f8"><input type="number" value="'+atp+'" placeholder="0" oninput="upM('+m+',\'atp\',this.value)"></td>';
    var mono=getV(c,m,'mono')||'';if(mono===0)mono='';
    filas+='<td style="background:#fff8f8"><input type="number" value="'+mono+'" placeholder="0" oninput="upM('+m+',\'mono\',this.value)"></td>';
    if(c.tieneTasasNac){
      var tus=getV(c,m,'tus')||'';if(tus===0)tus='';filas+='<td style="background:#fff8f8"><input type="number" value="'+tus+'" placeholder="0" oninput="upM('+m+',\'tus\',this.value)"></td>';

function renderGastosLive(c, totalFact){
  var el=document.getElementById('gastos-live');if(!el)return;
  if(!totalFact)totalFact=getTotalFact(c);
  var gastos=getGastosCompletos(c);
  var totalGastos=0;for(var i=0;i<gastos.length;i++)totalGastos+=gastos[i].val;
  var ganancia=totalFact-totalGastos;
  var pct=totalFact>0?(totalGastos/totalFact*100):0;
  var barColor=pct>80?'#c0392b':pct>50?'#e67e22':'#27ae60';

  var html='<div class="card"><div class="card-title">Resumen económico · '+c.anio+'</div>'+
    '<table class="resumen-table">'+
    '<tr class="fact-total"><td>Total facturación</td><td>$'+fmt(totalFact)+'</td></tr>';
  for(var i=0;i<gastos.length;i++)html+='<tr><td>'+gastos[i].label+'</td><td style="color:#c0392b">− $'+fmt(gastos[i].val)+'</td></tr>';
  html+='<tr class="total-gastos"><td>Total gastos</td><td>$'+fmt(totalGastos)+'</td></tr>'+
    '<tr class="ganancia"><td>Ganancia del año</td><td>$'+fmt(ganancia)+'</td></tr>'+
    '<tr class="porcentaje"><td>% Gastos / Facturación</td><td>'+pct.toFixed(1)+'%</td></tr>'+
    '</table>'+
    '<div class="pct-bar-wrap"><div class="pct-bar" style="width:'+Math.min(pct,100)+'%;background:'+barColor+'"></div></div>'+
    '<p style="font-size:11px;color:#aaa;margin-top:6px">'+pct.toFixed(1)+'% de la facturación se destina a gastos</p>'+
  '</div>';
  el.innerHTML=html;
}

function renderRecat(){
  var c=getClient();if(!c)return;
  var el=document.getElementById('recat-resultado');if(!el)return;
  var totalFact=getTotalFact(c);
  var semAnt=parseFloat(c.semAnterior||0);
  var acumulado=totalFact+semAnt;
  var catActual=null,idxActual=-1;
  for(var i=0;i<CATEGORIAS_2026.length;i++){if(CATEGORIAS_2026[i].cat===c.categoria){catActual=CATEGORIAS_2026[i];idxActual=i;break;}}
  var margen=catActual?catActual.limite-acumulado:0;
  var badge=!catActual?'<span class="badge-warn">Categoría no encontrada</span>':
    margen<0?'<span class="badge-danger">Excedido por $'+fmt(Math.abs(margen))+'</span>':
    margen<(catActual.limite*0.1)?'<span class="badge-warn">Margen ajustado — quedan $'+fmt(margen)+'</span>':
    '<span class="badge-ok">Dentro de la categoría — quedan $'+fmt(margen)+'</span>';

  var anioSig=parseInt(c.anio)+1;
  var html='<div class="recat-box">'+
    '<div class="recat-title">Acumulado recategorización '+c.recatFecha+' '+anioSig+'</div>'+
    '<div class="recat-number">$'+fmt(acumulado)+'</div>'+badge+
    '<div style="font-size:12px;color:#5a7aaa;margin-top:10px">Sem. anterior: <strong>$'+fmt(semAnt)+'</strong> + Facturado: <strong>$'+fmt(totalFact)+'</strong></div>'+
  '</div>'+
  '<div class="card"><div class="card-title">Categorías vigentes 2026</div>'+
  '<table class="cat-table"><thead><tr><th>Cat.</th><th>Límite anual ($)</th><th>Diferencia con acumulado</th></tr></thead><tbody>';
  for(var i=0;i<CATEGORIAS_2026.length;i++){
    var cat=CATEGORIAS_2026[i],diff=cat.limite-acumulado;
    var cls='';
    if(cat.cat===c.categoria)cls=' class="actual"';
    else if(idxActual>=0&&i===idxActual+1)cls=' class="siguiente"';
    else if(diff<0)cls=' class="excedido"';
    html+='<tr'+cls+'><td><strong>'+cat.cat+'</strong>'+(cat.cat===c.categoria?' ◀ actual':'')+'</td>'+
      '<td>$'+fmt(cat.limite)+'</td>'+
      '<td style="color:'+(diff>=0?'#27ae60':'#c0392b')+';font-weight:600">'+(diff>=0?'+ ':'')+'$'+fmt(diff)+'</td></tr>';
  }
  html+='</tbody></table></div>';
  el.innerHTML=html;
}

function showTab(id,el){
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('tab-'+id).classList.add('active');
  el.classList.add('active');
  var c=getClient();if(!c)return;
  if(id==='preview')buildPreview(c);
  if(id==='gastos')renderGastosLive(c,getTotalFact(c));
  if(id==='recat')renderRecat();
}

function generarPDF(){
  var c=getClient();if(!c)return;
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({unit:'mm',format:'a4'});
  var W=210,M=18;
  var mesNombre=MESES_FULL[parseInt(c.mesInforme||0)];
  var totalFact=getTotalFact(c);
  var gastos=getGastosCompletos(c);
  var totalGastos=0;for(var i=0;i<gastos.length;i++)totalGastos+=gastos[i].val;
  var ganancia=totalFact-totalGastos;
  var pct=totalFact>0?(totalGastos/totalFact*100):0;
  var semAnt=parseFloat(c.semAnterior||0);
  var acumulado=totalFact+semAnt;
  var anioSig=parseInt(c.anio)+1;

  // Obtener configuración
  var cfg=getCfg();

  // ===== PÁGINA 1: PORTADA =====
  // Fondo gris azulado
  doc.setFillColor(88,103,126);doc.rect(0,0,W,297,'F');
  
  // Logo monograma "ma" - dibujado con formas
  // Círculo decorativo

  var y=52;

  // Facturación
  sect('1- INGRESOS ANUALES DECLARADOS');

  doc.text('a- ARCA',M,y);y+=4;
  if(c.arcaDeuda){

  doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(40,40,40);

  if(!c.atpAldia){
    doc.setFillColor(255,247,237);doc.roundedRect(M,y,W-M*2,9,2,2,'F');

  }else{
    doc.setFillColor(240,250,243);doc.roundedRect(M,y,W-M*2,9,2,2,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(40,130,70);
    doc.text('Al día',M+4,y+6);y+=13;
  }
  y+=2;

  // Tasas
  var secNum=4;
  if(c.tieneTasasNac){
    var tusT=0,cntT=0;for(var m=0;m<12;m++){tusT+=getV(c,m,'tus');cntT+=getV(c,m,'cnt');}
    sect(secNum+'- TASAS NACIONALES (TUSV / CNT)');secNum++;
    doc.setFillColor(248,249,251);doc.roundedRect(M,y,W-M*2,11,2,2,'F');

  if(y>215){doc.addPage();y=20;}
  sect(secNum+'- GASTOS Y GANANCIA');secNum++;
  var lineH=6.5;
  var boxH=(gastos.length+4)*lineH+10;
  doc.setFillColor(248,249,251);doc.roundedRect(M,y,W-M*2,boxH,2,2,'F');

  var yy=y+7;
  doc.text('Total facturación',M+4,yy);doc.text('$'+fmt(totalFact),W-M-4,yy,{align:'right'});yy+=lineH;
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(80,80,80);
  for(var i=0;i<gastos.length;i++){
    doc.text(gastos[i].label,M+4,yy);
    doc.setTextColor(180,40,40);doc.text('− $'+fmt(gastos[i].val),W-M-4,yy,{align:'right'});
    doc.setTextColor(80,80,80);yy+=lineH;
  }
  doc.setDrawColor(180,180,180);doc.line(M+4,yy-2,W-M-4,yy-2);
  doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(192,57,43);
  doc.text('Total gastos',M+4,yy);doc.text('$'+fmt(totalGastos),W-M-4,yy,{align:'right'});yy+=lineH+1;
  doc.setTextColor(39,174,96);doc.setFontSize(11);
  doc.text('Ganancia del año',M+4,yy);doc.text('$'+fmt(ganancia),W-M-4,yy,{align:'right'});yy+=lineH;
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(100,100,100);
  doc.text('% Gastos / Facturación',M+4,yy);doc.text(pct.toFixed(1)+'%',W-M-4,yy,{align:'right'});
  y+=boxH+6;

  // Recategorización
  if(y>225){doc.addPage();y=20;}
  sect(secNum+'- RECATEGORIZACIÓN '+c.recatFecha.toUpperCase()+' '+anioSig);
  doc.setFillColor(220,232,250);doc.roundedRect(M,y,W-M*2,24,2,2,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(15);doc.setTextColor(26,58,102);
  doc.text('Acumulado: $'+fmt(acumulado),W/2,y+11,{align:'center'});
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(80,110,160);
  doc.text('Sem. anterior $'+fmt(semAnt)+' + Facturado $'+fmt(totalFact),W/2,y+19,{align:'center'});
  y+=30;
  doc.setFillColor(220,227,235);doc.rect(M,y,W-M*2,5.5,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(40,40,40);
  doc.text('Categoría',M+2,y+3.8);doc.text('Límite anual',M+30,y+3.8);doc.text('Diferencia',W-M-2,y+3.8,{align:'right'});y+=5.5;
  for(var i=0;i<CATEGORIAS_2026.length;i++){
    var cat=CATEGORIAS_2026[i],diff=cat.limite-acumulado;
    var isActual=cat.cat===c.categoria;
    var isSig=idxActual>=0&&i===idxActual+1;
    if(isActual){doc.setFillColor(210,230,255);}
    else if(isSig){doc.setFillColor(255,250,220);}
    else if(diff<0){doc.setFillColor(255,235,235);}
    else{if(i%2===0)doc.setFillColor(249,250,251);else doc.setFillColor(255,255,255);}
    doc.rect(M,y,W-M*2,5,'F');

  doc.save('Informe_'+(c.nombre||'cliente').replace(/ /g,'_')+'_'+mesNombre+'_'+c.anio+'.pdf');

// ===== CONFIGURACIÓN =====
var defaultCfg = {
  nombre: 'MARÍA SOLEDAD MONTOYA',
  titulo: 'Gestión del Cambio y Mejora de Procesos',
  cuit: '27-27657234-8',
  tel: '362-4282433',
  mail: 'masoledadmontoya@gmail.com',
  ig: 'soledadmontoya.ok',
  li: 'Soledad Montoya'
};

function loadCfg(){
  try{var s=localStorage.getItem('mono_cfg');return s?JSON.parse(s):Object.assign({},defaultCfg);}
  catch(e){return Object.assign({},defaultCfg);}
}
function saveCfgData(cfg){try{localStorage.setItem('mono_cfg',JSON.stringify(cfg));}catch(e){}}
function getCfg(){return loadCfg();}

function openSettings(){
  var cfg=loadCfg();
  document.getElementById('cfg-nombre').value=cfg.nombre||'';
  document.getElementById('cfg-titulo').value=cfg.titulo||'';
  document.getElementById('cfg-cuit').value=cfg.cuit||'';
  document.getElementById('cfg-tel').value=cfg.tel||'';
  document.getElementById('cfg-mail').value=cfg.mail||'';
  document.getElementById('cfg-ig').value=cfg.ig||'';
  document.getElementById('cfg-li').value=cfg.li||'';
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings(){document.getElementById('settings-modal').classList.remove('open');}
function saveSettings(){
  var cfg={
    nombre:document.getElementById('cfg-nombre').value||defaultCfg.nombre,
    titulo:document.getElementById('cfg-titulo').value||defaultCfg.titulo,
    cuit:document.getElementById('cfg-cuit').value||defaultCfg.cuit,
    tel:document.getElementById('cfg-tel').value||defaultCfg.tel,
    mail:document.getElementById('cfg-mail').value||defaultCfg.mail,
    ig:document.getElementById('cfg-ig').value||defaultCfg.ig,
    li:document.getElementById('cfg-li').value||defaultCfg.li
  };
  saveCfgData(cfg);
  closeSettings();
  alert('¡Datos guardados!');
}

// Cerrar modal al clickear afuera
document.getElementById('settings-modal').addEventListener('click',function(e){
  if(e.target===this)closeSettings();
});

loadData();
// Migrar clientes viejos que no tienen meses inicializados
for(var i=0;i<appData.clients.length;i++){
  var c=appData.clients[i];
  if(!c.meses||c.meses.length===0){c.meses=[];for(var j=0;j<12;j++)c.meses.push({});}
  if(!c.rubros){c.rubros=[{nombre:'Facturación principal',tipo:'servicios'}];}
  // Asegurar campos nuevos
  if(c.tieneFactRec===undefined)c.tieneFactRec=false;
  if(c.tienePctCompras===undefined)c.tienePctCompras=false;
  if(c.pctCompras===undefined)c.pctCompras=30;
  if(c.tieneAlquiler===undefined)c.tieneAlquiler=false;
  if(c.tieneLuz===undefined)c.tieneLuz=false;
  if(c.tieneInternet===undefined)c.tieneInternet=false;
  if(c.tieneRentas===undefined)c.tieneRentas=false;
  if(c.tieneOtrosGastos===undefined)c.tieneOtrosGastos=false;
  if(c.recatFecha===undefined)c.recatFecha='julio';
  if(c.semAnterior===undefined)c.semAnterior='';
  if(c.labelRentas===undefined)c.labelRentas='Rentas / DGR';
  if(c.labelOtros===undefined)c.labelOtros='Otros gastos';
}
saveData();
renderSidebar();
