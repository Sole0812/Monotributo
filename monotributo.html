yme": false, "mipymeVence": "", "mipymeCat": "Micro", "tieneFactRec": false, "tienePctCompras": false, "pctCompras": 30, "tieneAlquiler": false, "alquiler": "", "tieneLuz": false, "luz": "", "tieneInternet": true, "internet": "", "tieneRentas": false, "rentas": "", "labelRentas": "Rentas / DGR", "tieneOtrosGastos": false, "otrosGastos": "", "labelOtros": "Otros gastos", "labelATP": "ATP Exento", "tieneRetenciones": false, "pctRetenciones": 3, "recatFecha": "julio", "semAnterior": "1330000", "anio": "2026", "mesInforme": "3", "asesoramiento": "\n¿Qué es el Monotributo Social?\nEl Monotributo Social es un régimen que te permite formalizar tu trabajo, emitir facturas, tener cobertura de salud para vos y tu grupo familiar y realizar aportes para tu jubilación.\n\nEstá pensado para acompañar a personas con bajos ingresos y promover su inclusión en el sistema tributario y de seguridad social, en especial a:\n\nTrabajadores independientes\nMicroemprendedores de bajos ingresos\n¿Con qué programas es compatible?\nPodés inscribirte al Monotributo Social aunque cobres:\n\nAsignación Universal por Hijo\nAsignación por Embarazo\nJubilaciones y pensiones que no superen el haber mínimo\nProgramas de inclusión social del Ministerio de Capital Humano\n¿Qué se paga?\nEl Monotributo Social tiene tres componentes:\n\nImpositivo\nPrevisional (jubilatorio)\nObra social\nEn este régimen:\n\nEl 100% del componente impositivo y jubilatorio está subsidiado.\nSolo se paga el 50% del aporte a la obra social.\n¿Quiénes pueden acceder?\nEstá dirigido a personas que realizan una actividad económica y se encuentran en situación de vulnerabilidad socioeconómica, como:\n\nTrabajadores independientes de bajos ingresos\nEmprendedores de la economía social\nBeneficiarios de programas sociales\nPequeños productores\nRequisitos\nPara inscribirte, tenés que cumplir con estos requisitos:\n\nTener más de 18 años.\nRealizar una sola actividad económica.\nTener ingresos brutos anuales inferiores a $ 10.277.988,13 .\nSer propietario de hasta 2 inmuebles, siempre que uno esté afectado al emprendimiento.\nSer propietario de hasta 3 bienes muebles registrables.\nNo ejercer una profesión universitaria como actividad económica.\nNo ser empleador ni socio de sociedades comerciales.\nTener ingresos únicamente de la actividad declarada (no se consideran las prestaciones sociales compatibles).\nLas cooperativas de trabajo deben contar con al menos 6 asociados.", "esSocial": false, "superficie": "", "kwAnual": ""}];

function newClient(){
  var c=makeClient();
  for(var i=0;i<12;i++)c.meses.push({});
  appData.clients.push(c);saveData();
  currentId=c.id;renderSidebar();renderMain();
}

function selectClient(id){currentId=id;renderSidebar();renderMain();}

function deleteClient(id,e){
  e.stopPropagation();
  if(!confirm('¿Eliminar este cliente?'))return;
  appData.clients=appData.clients.filter(function(c){return c.id!==id;});
  if(currentId===id)currentId=null;
  saveData();renderSidebar();
  if(!currentId)document.getElementById('main-area').innerHTML='<div class="empty-state"><p>Seleccioná un cliente o creá uno nuevo.</p><button class="btn-new" style="width:auto;padding:10px 22px;border-radius:8px" onclick="newClient()">+ Nuevo cliente</button></div>';
  else renderMain();
}

function renderSidebar(){
  var el=document.getElementById('client-list'),html='';
  for(var i=0;i<appData.clients.length;i++){
    var c=appData.clients[i],a=c.id===currentId?' active':'';
    html+='<div class="client-item'+a+'" onclick="selectClient(\''+c.id+'\')">';
    html+='<span class="client-name">'+(c.nombre||'Sin nombre')+'</span>';
    html+='<span class="del-btn" onclick="deleteClient(\''+c.id+'\',event)">✕</span></div>';
  }
  el.innerHTML=html;
}

function up(f,v){var c=getClient();if(!c)return;c[f]=v;saveData();if(f==='nombre')renderSidebar();}
function upM(mi,k,v){var c=getClient();if(!c)return;if(!c.meses[mi])c.meses[mi]={};c.meses[mi][k]=v;saveData();calcTotales();}
function getV(c,m,k){return parseFloat((c.meses[m]&&c.meses[m][k])?c.meses[m][k]:0)||0;}

function getTotalFact(c){
  var t=0;
  for(var m=0;m<12;m++)for(var r=0;r<c.rubros.length;r++)t+=getV(c,m,'r'+r);
  return t;
}

function calcTotales(){
  var c=getClient();if(!c)return;
  var nR=c.rubros.length,tots=[],grand=0;
  for(var i=0;i<nR;i++)tots.push(0);
  for(var m=0;m<12;m++){
    var rowT=0;
    for(var r=0;r<nR;r++){var v=getV(c,m,'r'+r);tots[r]+=v;rowT+=v;}
    var rt=document.getElementById('rowt-'+m);if(rt)rt.textContent=rowT>0?'$'+rowT.toLocaleString('es-AR',{maximumFractionDigits:0}):'';
    grand+=rowT;
  }
  for(var r=0;r<nR;r++){var el=document.getElementById('colt-'+r);if(el)el.textContent=tots[r]>0?'$'+tots[r].toLocaleString('es-AR',{maximumFractionDigits:0}):'';}
  var gt=document.getElementById('grand-total');if(gt)gt.textContent=grand>0?'$'+grand.toLocaleString('es-AR',{maximumFractionDigits:0}):'';
  var gr=document.getElementById('gastos-live');if(gr)renderGastosLive(c,grand);
}

function getGastosCompletos(c){
  var totalFact=getTotalFact(c);
  var gastos=[];
  if(c.tieneFactRec){var fr=0;for(var m=0;m<12;m++)fr+=getV(c,m,'fr');if(fr>0)gastos.push({label:'Facturas recibidas',val:fr});}
  if(c.tienePctCompras){var pct=parseFloat(c.pctCompras||0)/100;gastos.push({label:'Compras estimadas ('+c.pctCompras+'% de facturación)',val:totalFact*pct});}
  var atpT=0;for(var m=0;m<12;m++)atpT+=getV(c,m,'atp');if(atpT>0)gastos.push({label:c.labelATP||'ATP',val:atpT});
  var monoT=0;for(var m=0;m<12;m++)monoT+=getV(c,m,'mono');if(monoT>0)gastos.push({label:'Monotributo',val:monoT});
  if(c.tieneTasasNac){
    var tusT=0,cntT=0;for(var m=0;m<12;m++){tusT+=getV(c,m,'tus');cntT+=getV(c,m,'cnt');}
    if(tusT>0)gastos.push({label:'Tasa Universal de Servicio',val:tusT});
    if(cntT>0)gastos.push({label:'Tasa CNT',val:cntT});
  }
  if(c.tieneTasaMunicipal){var munT=0;for(var m=0;m<12;m++)munT+=getV(c,m,'mun');if(munT>0)gastos.push({label:'Tasa Municipal',val:munT});}
  if(c.tieneAlquiler){var alqT=0;for(var m=0;m<12;m++)alqT+=getV(c,m,'alq');if(alqT>0)gastos.push({label:'Alquiler',val:alqT});}
  if(c.tieneLuz){var luzT=0;for(var m=0;m<12;m++)luzT+=getV(c,m,'luz');if(luzT>0)gastos.push({label:'Luz',val:luzT});}
  if(c.tieneInternet){var intT=0;for(var m=0;m<12;m++)intT+=getV(c,m,'int');if(intT>0)gastos.push({label:'Internet / Celular',val:intT});}
  if(c.tieneRentas){var renT=0;for(var m=0;m<12;m++)renT+=getV(c,m,'ren');if(renT>0)gastos.push({label:c.labelRentas||'Rentas / DGR',val:renT});}
  if(c.tieneOtrosGastos&&c.otrosGastos)gastos.push({label:c.labelOtros||'Otros gastos',val:parseFloat(c.otrosGastos)});
  if(c.tieneRetenciones){var retT=0;for(var m=0;m<12;m++)retT+=getV(c,m,'ret');if(retT>0)gastos.push({label:'Retenciones sufridas (pago a cuenta '+(c.labelATP||'ATP')+')',val:retT});}
  return gastos;
}

function addRubro(){var c=getClient();if(!c||c.rubros.length>=5)return;c.rubros.push({nombre:'',tipo:'servicios'});saveData();renderMain();}
function removeRubro(i){
  var c=getClient();if(!c||c.rubros.length<=1)return;
  c.rubros.splice(i,1);saveData();renderMain();
}
function upRubro(i,f,v){var c=getClient();if(!c)return;c.rubros[i][f]=v;saveData();if(f==='nombre'){var th=document.getElementById('rth-'+i);if(th)th.textContent=v||('Rubro '+(i+1));}}

function renderGastosLive(c, totalFact){
  var el=document.getElementById('gastos-live');if(!el)return;
  if(!totalFact)totalFact=getTotalFact(c);
  var gastos=getGastosCompletos(c);
  var totalGastos=0;for(var i=0;i<gastos.length;i++)totalGastos+=gastos[i].val;
  var ganancia=totalFact-totalGastos;
  var pct=totalFact>0?(totalGastos/totalFact*100):0;
  var barColor=pct>80?'#c0392b':pct>50?'#e67e22':'#27ae60';

  var html='<div class="card"><div class="card-title">Resumen económico · '+c.anio+'</div>'+
    '<table class="resumen-table">'+
    '<tr class="fact-total"><td>Total facturación</td><td>$'+fmt(totalFact)+'</td></tr>';
  for(var i=0;i<gastos.length;i++)html+='<tr><td>'+gastos[i].label+'</td><td style="color:#c0392b">− $'+fmt(gastos[i].val)+'</td></tr>';
  html+='<tr class="total-gastos"><td>Total gastos</td><td>$'+fmt(totalGastos)+'</td></tr>'+
    '<tr class="ganancia"><td>Ganancia del año</td><td>$'+fmt(ganancia)+'</td></tr>'+
    '<tr class="porcentaje"><td>% Gastos / Facturación</td><td>'+pct.toFixed(1)+'%</td></tr>'+
    '</table>'+
    '<div class="pct-bar-wrap"><div class="pct-bar" style="width:'+Math.min(pct,100)+'%;background:'+barColor+'"></div></div>'+
    '<p style="font-size:11px;color:#aaa;margin-top:6px">'+pct.toFixed(1)+'% de la facturación se destina a gastos</p>'+
  '</div>';
  el.innerHTML=html;
}

    (catActual?'<div style="margin-top:10px;background:rgba(255,255,255,0.15);border-radius:8px;padding:10px">'+

      '<div style="font-size:20px;font-weight:700;color:'+(margen>=0?'#fff':'#ffcccc')+'">$'+fmt(Math.abs(margen))+'</div>'+
      '<div style="background:rgba(0,0,0,0.15);border-radius:6px;height:6px;margin-top:8px">'+

    '<div class="card-title">Situación en la categoría actual</div>'+

      '<tr><td style="padding:10px;border:1px solid #dde">Podés facturar para mantenerte en la categoría</td><td style="padding:10px;text-align:right;border:1px solid #dde;font-weight:700;color:#27ae60">$'+fmt(margen>0?margen:0)+'</td></tr>'+
      (catSiguiente?'<tr style="background:#fff8e6"><td style="padding:10px;font-weight:600;border:1px solid #dde">CATEGORÍA '+catSiguiente.cat+'</td><td style="padding:10px;text-align:right;border:1px solid #dde;font-weight:700;color:#8a6200">$'+fmt(catSiguiente.limite)+'</td></tr>':'')+
    '</table>'+
  '</div>'+
  '<div class="card"><div class="card-title">Todas las categorías 2026</div>'+
  '<table class="cat-table"><thead><tr><th>Cat.</th><th>Límite anual ($)</th><th>Diferencia con acumulado</th></tr></thead><tbody>';
  for(var i=0;i<CATEGORIAS_2026.length;i++){
    var cat=CATEGORIAS_2026[i],diff=cat.limite-acumulado;
    var cls='';
    if(cat.cat===c.categoria)cls=' class="actual"';
    else if(idxActual>=0&&i===idxActual+1)cls=' class="siguiente"';

function buildChecklist(c){
  var el=document.getElementById('checklist-container');
  if(!el)return;
  var totalFact=getTotalFact(c);
  var gastos=getGastosCompletos(c);
  var totalGastos=0;for(var i=0;i<gastos.length;i++)totalGastos+=gastos[i].val;
  var pct=totalFact>0?(totalGastos/totalFact*100):0;
  var semAnt=parseFloat(c.semAnterior||0);
  var acumulado=totalFact+semAnt;
  var catActual=null;
  for(var i=0;i<CATEGORIAS_2026.length;i++){if(CATEGORIAS_2026[i].cat===c.categoria){catActual=CATEGORIAS_2026[i];break;}}
  var margen=catActual?catActual.limite-acumulado:0;
  var pctUsado=catActual?(acumulado/catActual.limite*100):0;

  var items=[];

  // 1. CONTROL DE FACTURACIÓN
  if(totalFact>0){
    items.push({tipo:'ok',texto:'Facturación acumulada: $'+fmt(totalFact)});
  } else {
    items.push({tipo:'warn',texto:'Sin facturación cargada en el período'});
  }

  // 2. CONTROL DE CATEGORÍA Y MARGEN
  if(catActual){
    if(margen<0){
      items.push({tipo:'danger',texto:'⚠ SUPERÓ el límite de categoría '+c.categoria+' por $'+fmt(Math.abs(margen))+'. Debe recategorizarse.'});
    } else if(pctUsado>=90){
      items.push({tipo:'danger',texto:'⚠ Usó el '+pctUsado.toFixed(1)+'% del límite. Quedan $'+fmt(margen)+'. Riesgo de exclusión inminente.'});
    } else if(pctUsado>=75){
      items.push({tipo:'warn',texto:'Usó el '+pctUsado.toFixed(1)+'% del límite. Quedan $'+fmt(margen)+'. Monitorear facturación.'});
    } else {
      items.push({tipo:'ok',texto:'Dentro de la categoría '+c.categoria+'. Puede facturar $'+fmt(margen)+' más.'});
    }
  }

  // 3. CONTROL % GASTOS / FACTURACIÓN
  if(totalFact>0){
    if(pct>90){
      items.push({tipo:'danger',texto:'% Gastos/Facturación muy alto: '+pct.toFixed(1)+'%. Ganancia muy baja. Revisar estructura de costos.'});
    } else if(pct>75){
      items.push({tipo:'warn',texto:'% Gastos/Facturación elevado: '+pct.toFixed(1)+'%. Ganancia ajustada.'});
    } else {
      items.push({tipo:'ok',texto:'% Gastos/Facturación saludable: '+pct.toFixed(1)+'%.'});
    }
  }

  // 4. CONTROL ARCA
  if(c.arcaDeuda){
    items.push({tipo:'danger',texto:'Deuda en ARCA: $'+fmt(c.arcaDeudor)+'. Obligación mensual: $'+fmt(c.arcaMensual)+'. Verificar plan de pago.'});
  } else {
    items.push({tipo:'ok',texto:'ARCA: Sin deuda. Al día.'});
  }

  // 5. CONTROL ATP/DGR
  if(!c.atpAldia){
    items.push({tipo:'warn',texto:(c.labelATP||'ATP')+' con deuda pendiente: $'+fmt(c.atpDeuda)+'. Regularizar.'});
  } else {
    items.push({tipo:'ok',texto:(c.labelATP||'ATP')+': Al día.'});
  }

  // 6. CONTROL VENCIMIENTO
  if(c.vencFecha){
    var hoy=new Date();
    var venc=new Date(c.vencFecha);
    var dias=Math.round((venc-hoy)/(1000*60*60*24));
    if(dias<0){
      items.push({tipo:'danger',texto:'⚠ Vencimiento VENCIDO el '+c.vencFecha+'. Importe: $'+fmt(c.vencImporte)+'. Pagar con urgencia.'});
    } else if(dias<=5){
      items.push({tipo:'danger',texto:'⚠ Vencimiento en '+dias+' días ('+c.vencFecha+'). Importe: $'+fmt(c.vencImporte)+'.'});
    } else if(dias<=15){
      items.push({tipo:'warn',texto:'Próximo vencimiento: '+c.vencFecha+' ('+dias+' días). Importe: $'+fmt(c.vencImporte)+'.'});
    } else {
      items.push({tipo:'ok',texto:'Vencimiento: '+c.vencFecha+' ('+dias+' días). Importe: $'+fmt(c.vencImporte)+'.'});
    }
  } else {
    items.push({tipo:'warn',texto:'Sin fecha de vencimiento cargada. Completar en Obligaciones.'});
  }

  // 7. CONTROL COMPROBANTES RECIBIDOS
  if(c.tieneFactRec){
    var frT=0;for(var m=0;m<12;m++)frT+=getV(c,m,'fr');
    if(frT>0){
      var pctFR=totalFact>0?(frT/totalFact*100):0;
      items.push({tipo:'ok',texto:'Comprobantes recibidos: $'+fmt(frT)+' ('+pctFR.toFixed(1)+'% de la facturación).'});
    } else {
      items.push({tipo:'warn',texto:'Sin comprobantes de compras cargados. Solicitar facturas de proveedores.'});
    }
  }

  // 8. CONTROL RECATEGORIZACIÓN PRÓXIMA
  if(c.recatFecha){
    items.push({tipo:'info',texto:'Próxima recategorización: '+c.recatFecha.toUpperCase()+'. Acumulado actual: $'+fmt(acumulado)+'.'});
  }

  // 9. MONOTRIBUTISTA SOCIAL
  if(c.esSocial||c.categoria==='S'){
    items.push({tipo:'info',texto:'Monotributista Social: verificar compatibilidad con programas sociales vigentes y tope de ingresos.'});
  }

  // 10. EXCLUSIÓN DEL RÉGIMEN - supera categoría K
  if(acumulado>108357084.05){
    items.push({tipo:'danger',texto:'⚠ EXCLUSIÓN DEL RÉGIMEN: El acumulado ($'+fmt(acumulado)+') supera el límite de la categoría K. Debe inscribirse como Responsable Inscripto.'});
  }

  // 11. MESES SIN FACTURACIÓN
  var mesesCero=0;
  for(var mi=0;mi<12;mi++){var tot=0;for(var ri=0;ri<c.rubros.length;ri++)tot+=getV(c,mi,'r'+ri);if(tot===0)mesesCero++;}
  var mesesConDatos=12-mesesCero;
  if(mesesConDatos>0&&mesesCero>=2){
    items.push({tipo:'warn',texto:mesesCero+' meses sin facturación registrada. Verificar si hubo actividad no declarada o justificar la inactividad.'});
  }

  // 12. CONTROL SUPERFICIE M²
  var limCat=LIMITES_CAT[c.categoria];
  if(limCat&&c.superficie&&parseFloat(c.superficie)>0){
    var supV=parseFloat(c.superficie);
    if(supV>limCat.m2){
      items.push({tipo:'danger',texto:'⚠ Superficie del local ('+supV+' m²) SUPERA el límite para categoría '+c.categoria+' ('+limCat.m2+' m²). Riesgo de exclusión.'});
    } else if(supV>limCat.m2*0.85){
      items.push({tipo:'warn',texto:'Superficie del local ('+supV+' m²) cercana al límite para categoría '+c.categoria+' ('+limCat.m2+' m²).'});
    } else {
      items.push({tipo:'ok',texto:'Superficie del local ('+supV+' m²) dentro del límite para categoría '+c.categoria+' ('+limCat.m2+' m²).'});
    }
  }

  // 13. CONTROL KW ENERGÍA ELÉCTRICA
  if(limCat&&c.kwAnual&&parseFloat(c.kwAnual)>0){
    var kwV=parseFloat(c.kwAnual);
    if(kwV>limCat.kw){
      items.push({tipo:'danger',texto:'⚠ Consumo eléctrico ('+kwV+' KW) SUPERA el límite para categoría '+c.categoria+' ('+limCat.kw+' KW). Riesgo de exclusión.'});
    } else if(kwV>limCat.kw*0.85){
      items.push({tipo:'warn',texto:'Consumo eléctrico ('+kwV+' KW) cercano al límite para categoría '+c.categoria+' ('+limCat.kw+' KW).'});
    } else {
      items.push({tipo:'ok',texto:'Consumo eléctrico ('+kwV+' KW) dentro del límite para categoría '+c.categoria+' ('+limCat.kw+' KW).'});
    }
  }

  // 14. ALQUILER VS LÍMITE
  if(limCat&&c.tieneAlquiler){
    var alqAnual=0;for(var mi=0;mi<12;mi++)alqAnual+=getV(c,mi,'alq');
    if(alqAnual>0){
      if(alqAnual>limCat.alqMax){
        items.push({tipo:'danger',texto:'⚠ Alquiler anual ($'+fmt(alqAnual)+') SUPERA el tope para categoría '+c.categoria+' ($'+fmt(limCat.alqMax)+'). Riesgo de exclusión.'});
      } else {
        items.push({tipo:'ok',texto:'Alquiler anual ($'+fmt(alqAnual)+') dentro del tope para categoría '+c.categoria+' ($'+fmt(limCat.alqMax)+'). '});
      }
    }
  }

  // 15. ADVERTENCIA SALDOS BANCARIOS
  items.push({tipo:'info',texto:'RESPONSABILIDAD DEL CLIENTE: Los movimientos en cuentas bancarias y billeteras virtuales deben coincidir con la facturación declarada. ARCA puede cruzar saldos bancarios con ingresos declarados. Es responsabilidad exclusiva del cliente declarar todas sus operaciones, incluyendo cobros en efectivo.'});

  // 10. MIPYME
  if(c.tieneMipyme&&c.mipymeVence){
    var hoy2=new Date();
    var vencM=new Date(c.mipymeVence);
    var diasM=Math.round((vencM-hoy2)/(1000*60*60*24));
    if(diasM<0){
      items.push({tipo:'danger',texto:'⚠ Certificado MiPyme VENCIDO el '+c.mipymeVence+'. Renovar urgente.'});
    } else if(diasM<=30){
      items.push({tipo:'warn',texto:'Certificado MiPyme vence en '+diasM+' días. Renovar pronto.'});
    } else {
      items.push({tipo:'ok',texto:'Certificado MiPyme vigente hasta '+c.mipymeVence+'.'});
    }
  }

  // Renderizar
  var colores={ok:'#e8f8ed',warn:'#fff8e0',danger:'#fff0f0',info:'#eef2f7'};
  var iconos={ok:'✓',warn:'⚠',danger:'✗',info:'ℹ'};
  var textos={ok:'#27ae60',warn:'#d68000',danger:'#c0392b',info:'#58677e'};
  var html2='<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">';
  for(var i=0;i<items.length;i++){
    var it=items[i];
    html2+='<div style="background:'+colores[it.tipo]+';border-radius:7px;padding:8px 12px;font-size:12px;color:'+textos[it.tipo]+';display:flex;gap:8px;align-items:flex-start">'+
      '<span style="font-weight:700;flex-shrink:0">'+iconos[it.tipo]+'</span>'+
      '<span>'+it.texto+'</span></div>';
  }
  html2+='</div>';
  el.innerHTML=html2;
}

function showTab(id,el){
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('tab-'+id).classList.add('active');
  el.classList.add('active');
  var c=getClient();if(!c)return;
  if(id==='preview')buildPreview(c);
  if(id==='gastos')renderGastosLive(c,getTotalFact(c));
  if(id==='recat')renderRecat();
  if(id==='obligaciones')buildChecklist(c);
}

function fmt(n){return parseFloat(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});}

function buildPreview(c){
  var totalFact=getTotalFact(c);
  var gastos=getGastosCompletos(c);
  var totalGastos=0;for(var i=0;i<gastos.length;i++)totalGastos+=gastos[i].val;
  var ganancia=totalFact-totalGastos;
  var pct=totalFact>0?(totalGastos/totalFact*100):0;
  var semAnt=parseFloat(c.semAnterior||0);
  var acumulado=totalFact+semAnt;
  var mesNombre=MESES_FULL[parseInt(c.mesInforme||0)];
  var pvCatActual=null,pvCatSig=null,pvMargen=0;
  for(var pi=0;pi<CATEGORIAS_2026.length;pi++){
    if(CATEGORIAS_2026[pi].cat===c.categoria){
      pvCatActual=CATEGORIAS_2026[pi];
      if(pi+1<CATEGORIAS_2026.length)pvCatSig=CATEGORIAS_2026[pi+1];
      break;
    }
  }
  pvMargen=pvCatActual?pvCatActual.limite-acumulado:0;
  var anioSig=c.anio;

  var html='<div class="section-sep">Datos del cliente</div>'+
    '<div class="preview-row"><span class="preview-label">Nombre</span><span class="preview-val">'+(c.nombre||'—')+'</span></div>'+
    '<div class="preview-row"><span class="preview-label">CUIT</span><span class="preview-val">'+(c.cuit||'—')+'</span></div>'+
    '<div class="preview-row"><span class="preview-label">Período</span><span class="preview-val">'+mesNombre+' '+c.anio+'</span></div>'+
    '<div class="preview-row"><span class="preview-label">Categoría</span><span class="preview-val">'+c.categoria+'</span></div>'+
    '<div class="section-sep">Facturación acumulada</div>';
  for(var i=0;i<c.rubros.length;i++){
    var t=0;for(var m=0;m<12;m++)t+=getV(c,m,'r'+i);
    html+='<div class="preview-row"><span class="preview-label">'+(c.rubros[i].nombre||'Rubro '+(i+1))+'</span><span class="preview-val">$'+fmt(t)+'</span></div>';
  }
  html+='<div class="preview-row"><span class="preview-label" style="font-weight:600">Total facturación</span><span class="preview-val" style="font-weight:600;color:#1a4ea8">$'+fmt(totalFact)+'</span></div>'+
    '<div class="section-sep">Gastos y Ganancia</div>';
  for(var i=0;i<gastos.length;i++)html+='<div class="preview-row"><span class="preview-label">'+gastos[i].label+'</span><span class="preview-val" style="color:#c0392b">$'+fmt(gastos[i].val)+'</span></div>';
  html+='<div class="preview-row"><span class="preview-label" style="font-weight:600">Total gastos</span><span class="preview-val" style="color:#c0392b;font-weight:600">$'+fmt(totalGastos)+'</span></div>'+
    '<div class="preview-row"><span class="preview-label" style="font-weight:600">Ganancia</span><span class="preview-val" style="color:#27ae60;font-weight:700">$'+fmt(ganancia)+'</span></div>'+
    '<div class="preview-row"><span class="preview-label">% Gastos / Facturación</span><span class="preview-val">'+pct.toFixed(1)+'%</span></div>'+
    '<div class="section-sep">Vencimiento · Próximo</div>'+
    '<div class="preview-row"><span class="preview-label">Fecha</span><span class="preview-val">'+(c.vencFecha||'—')+'</span></div>'+
    '<div class="preview-row"><span class="preview-label">Importe</span><span class="preview-val">$'+fmt(c.vencImporte)+'</span></div>'+
    '<div class="section-sep">Cumplimiento</div>'+
    '<div class="preview-row"><span class="preview-label">ARCA</span><span class="preview-val">'+(c.arcaDeuda?'Deuda: $'+fmt(c.arcaDeudor):'Al día')+'</span></div>'+
    '<div class="preview-row"><span class="preview-label">ATP</span><span class="preview-val">'+(c.atpAldia?'Al día':'Deuda: $'+fmt(c.atpDeuda))+'</span></div>'+
    '<div class="section-sep">Recategorización '+c.recatFecha+' '+anioSig+'</div>'+
    '<div class="preview-row"><span class="preview-label">Acumulado</span><span class="preview-val" style="font-weight:700;color:#1a3a6a">$'+fmt(acumulado)+'</span></div>'+
    (pvCatActual?
      '<div style="margin-top:10px;border:1px solid #dde;border-radius:8px;overflow:hidden">'+
        '<div style="background:#deeeff;padding:8px 12px;display:flex;justify-content:space-between"><span style="font-weight:600;color:#1a5c9e">CATEGORÍA '+c.categoria+'</span><span style="font-weight:700;color:#1a5c9e">$'+fmt(pvCatActual.limite)+'</span></div>'+
        '<div style="background:#fff;padding:8px 12px;display:flex;justify-content:space-between;border-top:1px solid #dde"><span style="color:#555">Podés facturar para mantenerte</span><span style="font-weight:700;color:#27ae60">$'+fmt(pvMargen>0?pvMargen:0)+'</span></div>'+
        (pvCatSig?'<div style="background:#fff8e6;padding:8px 12px;display:flex;justify-content:space-between;border-top:1px solid #dde"><span style="font-weight:600;color:#8a6200">CATEGORÍA '+pvCatSig.cat+'</span><span style="font-weight:700;color:#8a6200">$'+fmt(pvCatSig.limite)+'</span></div>':'')+
      '</div>'
    :'');
  if(c.asesoramiento&&String(c.asesoramiento).trim().length>0){
    html+='<div class="section-sep">Asesoramiento</div>'+
    '<div style="font-size:13px;color:#444;padding:8px 0;line-height:1.6">'+c.asesoramiento+'</div>';
  }
  document.getElementById('preview-data').innerHTML=html;
}

    y+=4;
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(88,103,126);
    doc.text('Notas adicionales:',M,y);y+=6;
    var aLines2=doc.splitTextToSize(String(c.asesoramiento),W-M*2-8);
    var aBoxH2=aLines2.length*5.5+12;
    if(y+aBoxH2>275){doc.addPage();y=20;}
    doc.setFillColor(248,252,248);doc.roundedRect(M,y,W-M*2,aBoxH2,2,2,'F');
    doc.setDrawColor(180,220,180);doc.roundedRect(M,y,W-M*2,aBoxH2,2,2);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(50,50,50);
    doc.text(aLines2,M+4,y+8);
    y+=aBoxH2+6;
  }

  // ===== PÁGINA FINAL: CONTACTO =====
  doc.addPage();
  var cfg2=getCfg();
  
  // Fondo gris
  doc.setFillColor(88,103,126);doc.rect(0,0,W,297,'F');
  
  // Logo en página final
  // Círculo decorativo
  doc.setFillColor(255,255,255);
  doc.circle(W/2, 85, 18, 'F');
  doc.setFillColor(88,103,126);
  doc.circle(W/2, 85, 15, 'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(20);doc.setFont('helvetica','bold');
  doc.text('SM',W/2,90,{align:'center'});
  
  // Línea
  doc.setDrawColor(255,255,255);doc.setLineWidth(0.3);
  doc.line(W/2-50,125,W/2+50,125);
  
  // Gracias
  doc.setFontSize(28);doc.setFont('helvetica','bold');
  doc.text('MUCHAS GRACIAS',W/2,145,{align:'center'});
  
  // Datos de contacto
  doc.setFontSize(11);doc.setFont('helvetica','normal');
  doc.setTextColor(220,225,235);
  var yc=168;var lh=9;
  doc.text('Contacto',W/2,yc,{align:'center'});yc+=lh;
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');
  doc.text(cfg2.nombre,W/2,yc,{align:'center'});yc+=lh;
  doc.setFont('helvetica','normal');doc.setTextColor(220,225,235);
  doc.text(cfg2.titulo,W/2,yc,{align:'center'});yc+=lh+3;
  doc.text('Tel: '+cfg2.tel,W/2,yc,{align:'center'});yc+=lh;
  doc.text('Mail: '+cfg2.mail,W/2,yc,{align:'center'});yc+=lh;
  if(cfg2.ig)doc.text('Instagram: @'+cfg2.ig.replace('@',''),W/2,yc,{align:'center'});yc+=lh;
  
  // Mostrar PDF en modal
  var pdfName = 'Informe_'+(c.nombre||'cliente').replace(/ /g,'_')+'_'+mesNombre+'_'+c.anio+'.pdf';
  var dataUri = doc.output('datauristring');
  mostrarPDFModal(dataUri, pdfName);
}



// ===== CONFIGURACIÓN =====
var defaultCfg = {
  nombre: 'MARÍA SOLEDAD MONTOYA',
  titulo: 'Gestión del Cambio y Mejora de Procesos',
  cuit: '27-27657234-8',
  tel: '362-4282433',
  mail: 'masoledadmontoya@gmail.com',
  ig: 'soysoledadmontoya',
  li: ''
};

function loadCfg(){
  try{var s=localStorage.getItem('mono_cfg');return s?JSON.parse(s):Object.assign({},defaultCfg);}
  catch(e){return Object.assign({},defaultCfg);}
}
function saveCfgData(cfg){try{localStorage.setItem('mono_cfg',JSON.stringify(cfg));}catch(e){}}
function getCfg(){return loadCfg();}

function mostrarPDFModal(dataUri, nombre){
  document.getElementById('pdf-title').textContent = nombre || 'Informe PDF';
  document.getElementById('pdf-frame').src = dataUri;
  document.getElementById('pdf-modal').classList.add('open');
}
function cerrarPDF(){
  document.getElementById('pdf-modal').classList.remove('open');
  document.getElementById('pdf-frame').src = '';
}
function imprimirPDF(){
  var frame = document.getElementById('pdf-frame');
  try{
    frame.contentWindow.focus();
    frame.contentWindow.print();
  }catch(e){
    window.print();
  }
}

function openSettings(){
  var cfg=loadCfg();
  document.getElementById('cfg-nombre').value=cfg.nombre||'';
  document.getElementById('cfg-titulo').value=cfg.titulo||'';
  document.getElementById('cfg-cuit').value=cfg.cuit||'';
  document.getElementById('cfg-tel').value=cfg.tel||'';
  document.getElementById('cfg-mail').value=cfg.mail||'';
  document.getElementById('cfg-ig').value=cfg.ig||'';
  document.getElementById('cfg-li').value=cfg.li||'';
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings(){document.getElementById('settings-modal').classList.remove('open');}
function saveSettings(){
  var cfg={
    nombre:document.getElementById('cfg-nombre').value||defaultCfg.nombre,
    titulo:document.getElementById('cfg-titulo').value||defaultCfg.titulo,
    cuit:document.getElementById('cfg-cuit').value||defaultCfg.cuit,
    tel:document.getElementById('cfg-tel').value||defaultCfg.tel,
    mail:document.getElementById('cfg-mail').value||defaultCfg.mail,
    ig:document.getElementById('cfg-ig').value||defaultCfg.ig,
    li:document.getElementById('cfg-li').value||defaultCfg.li
  };
  saveCfgData(cfg);
  closeSettings();
  alert('¡Datos guardados!');
}

// Cerrar modal al clickear afuera
window.addEventListener('load', function(){
  var modal = document.getElementById('settings-modal');
  if(modal) modal.addEventListener('click',function(e){
    if(e.target===this)closeSettings();
  });
});

function exportarClientes(){
  var datos={clientes:appData.clients,fecha:new Date().toLocaleDateString('es-AR'),version:'1.0'};
  var blob=new Blob([JSON.stringify(datos,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='clientes_monotributo_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importarClientes(event){
  var file=event.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var datos=JSON.parse(e.target.result);
      var clientes=datos.clientes||datos;
      if(!Array.isArray(clientes))throw new Error('Formato inválido');
      if(!confirm('Se van a importar '+clientes.length+' clientes. ¿Reemplazar los actuales?'))return;
      appData.clients=clientes;
      saveData();
      currentId=null;
      renderSidebar();
      document.getElementById('main-area').innerHTML='<div class="empty-state"><p>Clientes importados correctamente. Seleccioná uno para comenzar.</p></div>';
      alert('¡'+clientes.length+' clientes importados correctamente!');
    }catch(err){
      alert('Error al importar: el archivo no es válido. Asegurate de usar un archivo exportado desde esta aplicación.');
    }
  };
  reader.readAsText(file);
  event.target.value='';
}

document.addEventListener('click', function(e){
